<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local Groundwater Context Engine</title>
  <style>
    :root {
      --bg-glass: rgba(248, 250, 247, 0.88);
      --border: rgba(88, 122, 101, 0.22);
      --text: #1f3b2d;
      --muted: #5e7466;
      --accent: #2f6f57;
      --accent-soft: #dbe9df;
      --shadow: 0 10px 30px rgba(24, 52, 38, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #edf3ee;
      color: var(--text);
    }

    iframe {
      display: block;
      width: 100vw;
      height: 100vh;
      border: none;
    }

    .topbar {
      position: absolute;
      top: 18px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      min-width: 420px;
      max-width: min(92vw, 820px);
      padding: 14px 18px 12px;
      border-radius: 18px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      text-align: center;
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.02em;
      margin: 0;
    }

    .subtitle {
      margin-top: 7px;
      font-size: 10px;
      color: var(--muted);
      line-height: 1.35;
    }

    .last-updated {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 20;
      padding: 10px 14px;
      border-radius: 14px;
      background: var(--bg-glass);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
      font-size: 12px;
      color: var(--muted);
    }

    .last-updated strong {
      display: block;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--accent);
      margin-bottom: 3px;
    }

    .credit {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 20;
      padding: 8px 12px;
      border-radius: 12px;
      background: rgba(248, 250, 247, 0.78);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .topbar {
        min-width: unset;
        width: calc(100vw - 24px);
        top: 12px;
        padding: 12px 14px 10px;
      }

      .title {
        font-size: 19px;
      }

      .subtitle {
        font-size: 12px;
      }

      .last-updated {
        top: auto;
        left: 12px;
        right: auto;
        bottom: 18px;
      }

      .credit {
        right: 12px;
        bottom: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="eyebrow">California Groundwater Monitoring</div>
    <h1 class="title">Local Groundwater Context Engine</h1>
    <div class="subtitle">
      Monitoring groundwater trends across California through public well data
    </div>
  </div>

  <div class="last-updated">
    <strong>Last Updated</strong>
    <span id="last-updated-text">Updated today</span>
  </div>

  <iframe src="map.html"></iframe>

  <div class="credit">Chong Min 2026</div>
</body>
</html>
